<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Image | SmritiKosha</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          animation: { blob: 'blob 12s infinite ease-in-out', fadeUp: 'fadeUp 0.4s ease-out both' },
          keyframes: {
            blob: { '0%,100%': { transform: 'translate(0,0) scale(1)' }, '33%': { transform: 'translate(40px,-28px) scale(1.06)' }, '66%': { transform: 'translate(-18px,18px) scale(0.96)' } },
            fadeUp: { '0%': { opacity: '0', transform: 'translateY(12px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
          },
        },
      },
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { background-color: #f3f4f6; }
    .blob-1 { background: radial-gradient(circle, rgba(167,139,250,0.40) 0%, transparent 70%); }
    .blob-2 { background: radial-gradient(circle, rgba(34,211,238,0.28) 0%, transparent 70%); }
    .glass-strong { background: rgba(255,255,255,0.78); backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px); border: 1px solid rgba(255,255,255,0.92); }
    .gradient-text { background: linear-gradient(135deg, #7c3aed 0%, #0891b2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .btn-primary { background: linear-gradient(135deg, #7c3aed 0%, #0891b2 100%); color: #fff; box-shadow: 0 4px 14px rgba(124,58,237,0.25); transition: opacity 0.2s, transform 0.15s; }
    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-ghost { background: rgba(255,255,255,0.60); border: 1px solid rgba(124,58,237,0.15); color: #4c1d95; transition: background 0.2s; }
    .btn-ghost:hover { background: rgba(255,255,255,0.90); }
    .sk-input { background: rgba(255,255,255,0.70); border: 1px solid rgba(124,58,237,0.15); color: #1e1b4b; transition: border-color 0.2s, box-shadow 0.2s; width: 100%; padding: 0.625rem 1rem; border-radius: 0.75rem; font-size: 0.875rem; }
    .sk-input::placeholder { color: rgba(100,80,180,0.35); }
    .sk-input:focus { outline: none; border-color: rgba(124,58,237,0.50); box-shadow: 0 0 0 3px rgba(124,58,237,0.10); background: rgba(255,255,255,0.95); }
  </style>
</head>
<body class="font-sans min-h-screen flex items-center justify-center px-4">

  <!-- Blobs -->
  <div class="fixed inset-0 pointer-events-none overflow-hidden" aria-hidden="true">
    <div class="blob-1 absolute w-[500px] h-[500px] rounded-full -top-48 -left-32 animate-blob opacity-80"></div>
    <div class="blob-2 absolute w-[420px] h-[420px] rounded-full -bottom-32 -right-32 animate-blob opacity-60" style="animation-delay:4s"></div>
  </div>

  <div class="glass-strong rounded-2xl p-8 w-full max-w-md shadow-xl animate-fadeUp relative z-10 space-y-6">
    <h1 class="text-xl font-bold gradient-text">Add Image to Memory</h1>

    <form id="add-image-form" class="space-y-5">
      <div class="space-y-1.5">
        <label for="image" class="block text-xs font-semibold text-violet-500 uppercase tracking-wider">Upload Image</label>
        <input id="image" type="file" accept="image/*" required class="sk-input cursor-pointer" />
        <p class="text-xs text-gray-400 mt-1">Max file size 5MB. JPG or PNG recommended.</p>
      </div>
      <div class="flex justify-between items-center pt-1">
        <button type="button" onclick="window.history.back()"
          class="btn-ghost text-sm font-medium px-4 py-2 rounded-xl">Cancel</button>
        <button type="submit"
          class="btn-primary text-sm font-medium px-5 py-2.5 rounded-xl">Upload</button>
      </div>
    </form>
  </div>

  <script type="module">
    import { supabase } from '../../lib/supabaseClient.js';

    const params    = new URLSearchParams(window.location.search);
    const memoryId  = params.get('id');
    const form      = document.getElementById('add-image-form');
    const imageInput = document.getElementById('image');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const file = imageInput.files[0];
      if (!file) return;

      const { data: { user } } = await supabase.auth.getUser();
      const safeName = file.name.replace(/\s+/g, '-').replace(/[^\w.-]/g, '');
      const filePath = `${user.id}/${Date.now()}_${safeName}`;

      const { error: uploadError } = await supabase.storage
        .from('memory-images')
        .upload(filePath, file, { cacheControl: '3600', upsert: false });

      if (uploadError) { alert('Image upload failed.'); console.error(uploadError); return; }

      const { error: insertError } = await supabase.from('memory_images').insert([{ memory_id: memoryId, image_path: filePath }]);
      if (insertError) { alert('Failed to link image to memory.'); console.error(insertError); return; }

      window.location.href = '/pages/main.html';
    });
  </script>
</body>
</html>
